name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  client-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm install --no-audit --no-fund
        working-directory: client

      - name: Build client
        run: npm run build
        working-directory: client

  server-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate server JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find server -type f -name '*.js' -not -path '*/node_modules/*' -print0)

  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate CLI package can be packed
        run: npm_config_cache="${RUNNER_TEMP}/npm-cache" npm pack --dry-run
        working-directory: packages/openclawworld
